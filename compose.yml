name: modsecurity

services:
  waf:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      BACKEND: "http://backend:8080"

    # Simulate OpenShift by using a random UID and GID, as well as GID 0
    user: "1001140000:1001140000"
    group_add:
      - root

    # Simulate an emptyDir volume. Required for apache to write its PID file
    tmpfs:
      - "/usr/local/apache2/logs:mode=770"

    develop:
      watch:
        - action: rebuild
          path: .

  backend:
    image: "docker.io/sharat87/httpbun:latest@sha256:538a126de2cd4235a8f1f87deb0d002791fd2d4f274033c4050961b6153a0a9a"
    environment:
      HTTPBUN_BIND: "0.0.0.0:8080"
